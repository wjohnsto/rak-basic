services:
  redis:
    container_name: redis
    image: 'redis:alpine'
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: app
    command: uv run uvicorn app:app --host 0.0.0.0
    ports:
      - 8000:8000
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    container_name: worker
    command: uv run rak worker --name minimal_release_demo --tasks app:tasks
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
